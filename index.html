<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Secure Program Synthesis Fellowship — Apart Research</title>
    <link rel="icon" type="image/png" href="/favicon.png">
    <link rel="apple-touch-icon" href="/favicon.png">
    <meta name="description" content="An Apart Research fellowship on secure program synthesis.">
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <style>
        :root {
            --bg: #101010;
            --panel: #1c1c1c;
            --border: #2c2d2c;
            --text: #f7f7f5;
            --muted: #a2a3a2;
            --accent: #46ff99;
            --accent-soft: #a2ffcc;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html, body { background: var(--bg); color: var(--text); }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Inter, sans-serif;
            min-height: 100vh;
            line-height: 1.6;
            -webkit-font-smoothing: antialiased;
        }
        a { color: var(--accent); text-decoration: none; }
        a:hover { color: var(--accent-soft); text-decoration: underline; }

        header {
            padding: 2rem 2rem 0;
            max-width: 960px;
            margin: 0 auto;
            display: flex;
            align-items: center;
            gap: 0.75rem;
        }
        header img { width: 28px; height: 28px; }
        header .org { color: var(--muted); font-size: 0.95rem; }

        main {
            max-width: 960px;
            margin: 0 auto;
            padding: 3rem 2rem 6rem;
        }

        #content h1 {
            font-size: clamp(2rem, 5vw, 3.5rem);
            font-weight: 700;
            line-height: 1.15;
            margin-bottom: 1.5rem;
            letter-spacing: -0.02em;
        }
        #content h2 {
            font-size: 1.5rem;
            font-weight: 600;
            margin-top: 4rem;
            margin-bottom: 1rem;
            letter-spacing: -0.01em;
        }
        #content h3 {
            font-size: 1rem;
            font-weight: 600;
            margin-bottom: 0.5rem;
            color: var(--accent);
        }
        #content p { margin-bottom: 1rem; }
        #content p:last-child { margin-bottom: 0; }

        .eyebrow {
            color: var(--accent) !important;
            font-size: 0.85rem !important;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.12em;
            margin-bottom: 1rem !important;
        }
        .lede {
            font-size: 1.2rem !important;
            color: var(--muted);
            max-width: 42em;
            margin-bottom: 2.5rem !important;
        }

        .cta, .cta-secondary {
            display: inline-block;
            font-weight: 600;
            padding: 0.85rem 1.5rem;
            border-radius: 0.5rem;
            transition: background 0.15s, border-color 0.15s;
        }
        .cta {
            background: var(--accent);
            color: #101010;
        }
        .cta:hover {
            background: var(--accent-soft);
            text-decoration: none;
            color: #101010;
        }
        .cta-secondary {
            color: var(--text);
            padding: 0.85rem 1.25rem;
            border: 1px solid var(--border);
        }
        .cta-secondary:hover {
            border-color: var(--accent);
            text-decoration: none;
        }
        .cta-row {
            display: flex;
            gap: 1rem;
            flex-wrap: wrap;
            align-items: center;
            margin-bottom: 1rem;
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
            gap: 1rem;
            margin-top: 1.5rem;
        }
        .card {
            background: var(--panel);
            border: 1px solid var(--border);
            border-radius: 0.75rem;
            padding: 1.25rem;
        }
        .card p {
            font-size: 0.95rem;
            color: var(--muted);
            margin-bottom: 0;
        }

        footer {
            max-width: 960px;
            margin: 0 auto;
            padding: 2rem;
            color: var(--muted);
            font-size: 0.9rem;
            border-top: 1px solid var(--border);
        }

        .error {
            color: #ff6b6b;
            font-family: ui-monospace, Menlo, monospace;
            font-size: 0.9rem;
            padding: 1rem;
            border: 1px solid #ff6b6b;
            border-radius: 0.5rem;
        }
    </style>
</head>
<body>
    <header>
        <img src="/favicon.png" alt="Apart Research">
        <span class="org">Apart Research Fellowship</span>
    </header>

    <main>
        <div id="content">Loading…</div>
    </main>

    <footer>
        Hosted at <a href="https://fmxai.org">fmxai.org</a> &middot; run in partnership with <a href="https://apartresearch.com">Apart Research</a>.
    </footer>

    <script>
        // Apply Pandoc-style {.class} suffixes on paragraphs/headings.
        // e.g. "Intro text {.lede}" -> <p class="lede">Intro text</p>
        function applyAttrs(html) {
            return html.replace(
                /<(p|h[1-6])>([\s\S]*?)\s*\{\.([\w\s-]+)\}\s*<\/\1>/g,
                (_, tag, inner, classes) =>
                    `<${tag} class="${classes.trim()}">${inner}</${tag}>`
            );
        }

        // Handle heading id syntax: ## Apply {#apply} -> <h2 id="apply">Apply</h2>
        function applyHeadingIds(html) {
            return html.replace(
                /<(h[1-6])>([\s\S]*?)\s*\{#([\w-]+)\}\s*<\/\1>/g,
                (_, tag, inner, id) => `<${tag} id="${id}">${inner}</${tag}>`
            );
        }

        fetch('/content/home.md')
            .then(r => {
                if (!r.ok) throw new Error(`${r.status} ${r.statusText}`);
                return r.text();
            })
            .then(md => {
                let html = marked.parse(md);
                html = applyHeadingIds(html);
                html = applyAttrs(html);
                document.getElementById('content').innerHTML = html;
            })
            .catch(err => {
                document.getElementById('content').innerHTML =
                    `<div class="error">Failed to load content: ${err.message}. ` +
                    `If you opened this file directly, serve it over HTTP ` +
                    `(e.g. <code>python -m http.server</code>).</div>`;
            });
    </script>
</body>
</html>
